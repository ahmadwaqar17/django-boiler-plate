upstream django {
    server django:8000;
}

server {
    listen 80;
    server_name lefty17.duckdns.org 52.201.178.136 localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lefty17.duckdns.org 52.201.178.136 localhost;
    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/lefty17.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lefty17.duckdns.org/privkey.pem;

    location /static/ {
        alias /staticfiles/;
    }

    location /media/ {
        alias /media/;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
